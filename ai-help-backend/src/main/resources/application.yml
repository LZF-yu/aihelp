# 应用配置
server:
  port: 8080

spring:
  application:
    name: ai-help-backend

  # 开发环境配置
  profiles:
    active: dev

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_help?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  # Redis配置（可选）
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.aihelp.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: aihelp-secret-key-for-jwt-token-generation-2024
  expiration: 86400000  # 24小时，单位毫秒

# AI配置（阿里云DashScope）
ai:
  api:
    url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    key: sk-23e959ad758e4737b248411dd84bc829
    model: qwen-turbo
    timeout: 30000  # 30秒超时

# 日志配置
logging:
  level:
    com.aihelp: debug
    org.springframework.security: debug
